<!DOCTYPE html>
<html>

<head>

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <style>

        html,
        body {

            margin: 0;
            padding: 0;

            background: black;

            color: white;

            font-family: sans-serif;

            touch-action: manipulation;

            height: 100%;

            overflow: hidden;
        }

        body {

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            gap: 18px;

            padding: 18px;

            box-sizing: border-box;
        }

        /* ----------------------------- */
        /* BUTTON GRID */
        /* ----------------------------- */

        #buttonGrid {

            width: 100%;

            max-width: 500px;

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 12px;
        }

        button {

            min-height: 84px;

            border: none;

            border-radius: 20px;

            font-size: 22px;

            font-weight: bold;

            background: white;

            color: black;

            box-shadow:
                0 8px 24px rgba(0,0,0,0.35);
        }

        button:active {

            transform: scale(0.98);

        }

        /* ----------------------------- */
        /* STATUS */
        /* ----------------------------- */

        #status {

            font-size: 22px;

            font-weight: bold;

            color: #ffe66d;
        }

        /* ----------------------------- */
        /* SENSOR PANEL */
        /* ----------------------------- */

        #sensorPanel {

            width: 100%;

            max-width: 500px;

            background: rgba(255,255,255,0.08);

            border-radius: 20px;

            padding: 18px;

            box-sizing: border-box;

            font-family: monospace;

            font-size: 18px;
        }

        #sensorGrid {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 16px;
        }

        .dataBox {

            background: rgba(255,255,255,0.05);

            border-radius: 14px;

            padding: 14px;
        }

        .label {

            font-size: 14px;

            opacity: 0.7;

            margin-bottom: 6px;
        }

        .value {

            font-size: 24px;

            font-weight: bold;
        }

        .accel {

            color: #ff6b6b;
        }

        .gyro {

            color: #74b9ff;
        }

        .absorption {

            color: #ffe66d;
        }

        .state {

            color: #7dff7d;
        }

        #countdown {

            font-size: 18px;

            opacity: 0.7;
        }

    </style>

</head>

<body>

    <!-- BUTTONS -->

    <div id="buttonGrid">

        <button onclick="startWalking()">
            WALKING
        </button>

        <button onclick="startStill()">
            STILL
        </button>

        <button onclick="resetRecording()">
            RESET
        </button>

        <button onclick="downloadRecording()">
            DOWNLOAD
        </button>

    </div>

    <!-- STATUS -->

    <div id="status">
        READY
    </div>

    <div id="countdown">
        00:00
    </div>

    <!-- SENSOR PANEL -->

    <div id="sensorPanel">

        <div id="sensorGrid">

            <div class="dataBox">

                <div class="label accel">
                    ACCEL
                </div>

                <div class="value accel"
                    id="accelValue">

                    0

                </div>

            </div>

            <div class="dataBox">

                <div class="label gyro">
                    GYRO
                </div>

                <div class="value gyro"
                    id="gyroValue">

                    0

                </div>

            </div>

            <div class="dataBox">

                <div class="label absorption">
                    ABSORPTION
                </div>

                <div class="value absorption"
                    id="absorptionValue">

                    0

                </div>

            </div>

            <div class="dataBox">

                <div class="label state">
                    STATE
                </div>

                <div class="value state"
                    id="stateValue">

                    paused

                </div>

            </div>

        </div>

    </div>

    <script>

        // ---------------------------------
        // UI
        // ---------------------------------

        const status =
            document.getElementById("status");

        const countdown =
            document.getElementById("countdown");

        const accelValue =
            document.getElementById("accelValue");

        const gyroValue =
            document.getElementById("gyroValue");

        const absorptionValue =
            document.getElementById("absorptionValue");

        const stateValue =
            document.getElementById("stateValue");

        // ---------------------------------
        // STATE
        // ---------------------------------

        let recording = false;

        let currentState = "paused";

        let absorption = 0;

        let sessionLog = [];

        let recordingStartTime = 0;

        let recordingDuration = 140000;

        // ---------------------------------
        // SENSOR VALUES
        // ---------------------------------

        let accMagnitude = 0;

        let gyroMagnitude = 0;

        let smoothAcc = 0;

        let smoothGyro = 0;

        // ---------------------------------
        // IOS PERMISSION
        // ---------------------------------

        async function enableMotion() {

            try {

                if (

                    typeof DeviceMotionEvent !==
                    "undefined"

                    &&

                    typeof DeviceMotionEvent
                        .requestPermission ===
                    "function"

                ) {

                    const permission =

                        await DeviceMotionEvent
                            .requestPermission();

                    console.log(permission);

                }

            }

            catch (err) {

                console.log(err);

            }

        }

        // ---------------------------------
        // START RECORDING
        // ---------------------------------

        async function startWalking() {

            await startRecording("walking");

        }

        async function startStill() {

            await startRecording("still");

        }

        async function startRecording(state) {

            await enableMotion();

            sessionLog = [];

            recording = true;

            currentState = state;

            recordingStartTime = Date.now();

            updateUI();

            // AUTO STOP AFTER 2m20s

            setTimeout(() => {

                if (!recording)
                    return;

                recording = false;

                status.innerText =
                    "SESSION COMPLETE";

                updateUI();

            }, recordingDuration);

        }

        // ---------------------------------
        // RESET
        // ---------------------------------

        function resetRecording() {

            const confirmReset =

                confirm(
                    "Reset recording?"
                );

            if (!confirmReset)
                return;

            sessionLog = [];

            recording = false;

            currentState = "paused";

            updateUI();

        }

        // ---------------------------------
        // DOWNLOAD
        // ---------------------------------

        function downloadRecording() {

            const trimmedLog =

                sessionLog.filter(entry => {

                    return (

                        entry.timeSinceStart
                        >= 10000

                        &&

                        entry.timeSinceStart
                        <= 130000

                    );

                });

            const sessionName = prompt(

                "Session name?",

                "session"

            );

            const blob = new Blob(

                [
                    JSON.stringify(
                        trimmedLog,
                        null,
                        2
                    )
                ],

                {
                    type: "application/json"
                }

            );

            const a =
                document.createElement("a");

            a.href =
                URL.createObjectURL(blob);

            a.download =
                `${sessionName}.json`;

            a.click();

        }

        // ---------------------------------
        // UI UPDATE
        // ---------------------------------

        function updateUI() {

            status.innerText =

                recording
                    ? "RECORDING"
                    : "PAUSED";

            stateValue.innerText =
                currentState;

        }

        // ---------------------------------
        // ABSORPTION
        // ---------------------------------

        function computeAbsorption() {

            const stillness =

                Math.max(
                    0,
                    20 - smoothAcc
                );

            const motionlessness =

                Math.max(
                    0,
                    10 - smoothGyro
                );

            absorption =

                stillness * 2
                + motionlessness * 2;

            absorption =

                Math.min(
                    100,
                    absorption
                );

        }

        // ---------------------------------
        // SENSOR LISTENER
        // ---------------------------------

        let lastSensorUpdate = 0;

        window.addEventListener(

            "devicemotion",

            e => {

                const now = Date.now();

                if (
                    now - lastSensorUpdate < 50
                ) return;

                lastSensorUpdate = now;

                // -------------------------
                // ACCEL
                // -------------------------

                const acc =

                    e.accelerationIncludingGravity
                    ||

                    e.acceleration;

                if (acc) {

                    const x = acc.x || 0;
                    const y = acc.y || 0;
                    const z = acc.z || 0;

                    accMagnitude = Math.sqrt(

                        x * x +
                        y * y +
                        z * z

                    );

                }

                // -------------------------
                // GYRO
                // -------------------------

                const rot =
                    e.rotationRate;

                if (rot) {

                    const a =
                        rot.alpha || 0;

                    const b =
                        rot.beta || 0;

                    const g =
                        rot.gamma || 0;

                    gyroMagnitude = Math.sqrt(

                        a * a +
                        b * b +
                        g * g

                    );

                }

                // -------------------------
                // SMOOTHING
                // -------------------------

                smoothAcc =

                    smoothAcc * 0.9
                    + accMagnitude * 0.1;

                smoothGyro =

                    smoothGyro * 0.9
                    + gyroMagnitude * 0.1;

                // -------------------------
                // ABSORPTION
                // -------------------------

                computeAbsorption();

                // -------------------------
                // DISPLAY
                // -------------------------

                accelValue.innerText =
                    smoothAcc.toFixed(2);

                gyroValue.innerText =
                    smoothGyro.toFixed(2);

                absorptionValue.innerText =
                    absorption.toFixed(1);

            }

        );

        // ---------------------------------
        // AUTO LOGGING
        // ---------------------------------

        setInterval(() => {

            if (!recording)
                return;

            const elapsed =

                Date.now()
                - recordingStartTime;

            // 4Hz
            // every 250ms

            const entry = {

                time: Date.now(),

                timeSinceStart:
                    elapsed,

                accel: smoothAcc,

                gyro: smoothGyro,

                absorption,

                state: currentState

            };

            sessionLog.push(entry);

            console.log(entry);

        }, 250);

        // ---------------------------------
        // COUNTDOWN
        // ---------------------------------

        setInterval(() => {

            if (!recording) {

                countdown.innerText =
                    "00:00";

                return;

            }

            const elapsed =

                Date.now()
                - recordingStartTime;

            const remaining =

                Math.max(
                    0,
                    recordingDuration - elapsed
                );

            const totalSeconds =

                Math.floor(
                    remaining / 1000
                );

            const minutes =

                String(
                    Math.floor(
                        totalSeconds / 60
                    )
                ).padStart(2, "0");

            const seconds =

                String(
                    totalSeconds % 60
                ).padStart(2, "0");

            countdown.innerText =

                `${minutes}:${seconds}`;

        }, 100);

    </script>

</body>

</html>
