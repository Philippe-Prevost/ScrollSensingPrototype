<!DOCTYPE html>
<html>

<head>

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <style>

        html,
        body {

            margin: 0;
            padding: 0;

            background: black;

            color: white;

            font-family: sans-serif;

            touch-action: manipulation;

            height: 100%;

            overflow: hidden;
        }

        body {

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            gap: 20px;

            padding: 20px;

            box-sizing: border-box;
        }

        /* ----------------------------- */
        /* BUTTON GRID */
        /* ----------------------------- */

        #buttonGrid {

            width: 100%;

            max-width: 500px;

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 14px;
        }

        button {

            min-height: 88px;

            border: none;

            border-radius: 22px;

            font-size: 24px;

            font-weight: bold;

            background: white;

            color: black;

            box-shadow:
                0 8px 24px rgba(0,0,0,0.35);
        }

        button:active {

            transform: scale(0.98);

        }

        /* ----------------------------- */
        /* STATUS */
        /* ----------------------------- */

        #status {

            font-size: 22px;

            font-weight: bold;

            color: #ffe66d;
        }

        /* ----------------------------- */
        /* SENSOR PANEL */
        /* ----------------------------- */

        #sensorPanel {

            width: 100%;

            max-width: 500px;

            background: rgba(255,255,255,0.08);

            border-radius: 20px;

            padding: 18px;

            box-sizing: border-box;

            font-family: monospace;

            line-height: 1.8;

            font-size: 18px;
        }

        .line {

            display: flex;

            justify-content: space-between;
        }

        .accel {

            color: #ff6b6b;
        }

        .gyro {

            color: #74b9ff;
        }

        .state {

            color: #7dff7d;
        }

    </style>

</head>

<body>

    <!-- BUTTONS -->

    <div id="buttonGrid">

        <button onclick="startWalking()">
            WALKING
        </button>

        <button onclick="startStill()">
            STILL
        </button>

        <button onclick="resetRecording()">
            RESET
        </button>

        <button onclick="downloadRecording()">
            DOWNLOAD
        </button>

    </div>

    <!-- STATUS -->

    <div id="status">
        READY
    </div>

    <!-- SENSOR PANEL -->

    <div id="sensorPanel">

        <div class="line accel">
            <span>ACCEL</span>
            <span id="accelValue">0</span>
        </div>

        <div class="line gyro">
            <span>GYRO</span>
            <span id="gyroValue">0</span>
        </div>

        <div class="line">
            <span>SWIPES</span>
            <span id="swipeValue">0</span>
        </div>

        <div class="line">
            <span>ABSORPTION</span>
            <span id="absorptionValue">0</span>
        </div>

        <div class="line state">
            <span>STATE</span>
            <span id="stateValue">paused</span>
        </div>

    </div>

    <script>

        // ---------------------------------
        // UI
        // ---------------------------------

        const status =
            document.getElementById("status");

        const accelValue =
            document.getElementById("accelValue");

        const gyroValue =
            document.getElementById("gyroValue");

        const swipeValue =
            document.getElementById("swipeValue");

        const absorptionValue =
            document.getElementById("absorptionValue");

        const stateValue =
            document.getElementById("stateValue");

        // ---------------------------------
        // STATE
        // ---------------------------------

        let recording = false;

        let currentState = "paused";

        let swipeCount = 0;

        let absorption = 0;

        let sessionLog = [];

        let recordingStartTime = 0;

        // ---------------------------------
        // SENSOR VALUES
        // ---------------------------------

        let accMagnitude = 0;

        let gyroMagnitude = 0;

        let smoothAcc = 0;

        let smoothGyro = 0;

        // ---------------------------------
        // IOS MOTION PERMISSION
        // ---------------------------------

        async function enableMotion() {

            try {

                if (

                    typeof DeviceMotionEvent !==
                    "undefined"

                    &&

                    typeof DeviceMotionEvent
                        .requestPermission ===
                    "function"

                ) {

                    const permission =

                        await DeviceMotionEvent
                            .requestPermission();

                    console.log(permission);

                }

            }

            catch (err) {

                console.log(err);

            }

        }

        // ---------------------------------
        // RECORDING CONTROLS
        // ---------------------------------

        async function startWalking() {

            await enableMotion();

            recording = true;

            currentState = "walking";

            recordingStartTime = Date.now();

            updateUI();

        }

        async function startStill() {

            await enableMotion();

            recording = true;

            currentState = "still";

            recordingStartTime = Date.now();

            updateUI();

        }

        function resetRecording() {

            const confirmReset =

                confirm("Reset recording?");

            if (!confirmReset)
                return;

            sessionLog = [];

            swipeCount = 0;

            recording = false;

            currentState = "paused";

            updateUI();

        }

        // ---------------------------------
        // DOWNLOAD
        // ---------------------------------

        function downloadRecording() {

            // REMOVE LAST 10 SECONDS

            const trimmedLog =

                sessionLog.filter(entry => {

                    return (

                        entry.time

                        <

                        Date.now() - 10000

                    );

                });

            const sessionName = prompt(

                "Session name?",

                "session"

            );

            const blob = new Blob(

                [
                    JSON.stringify(
                        trimmedLog,
                        null,
                        2
                    )
                ],

                {
                    type: "application/json"
                }

            );

            const a =
                document.createElement("a");

            a.href =
                URL.createObjectURL(blob);

            a.download =
                `${sessionName}.json`;

            a.click();

        }

        // ---------------------------------
        // UI UPDATE
        // ---------------------------------

        function updateUI() {

            status.innerText =

                recording
                    ? "RECORDING"
                    : "PAUSED";

            stateValue.innerText =
                currentState;

        }

        // ---------------------------------
        // ABSORPTION
        // ---------------------------------

        function computeAbsorption() {

            const stillness =

                Math.max(
                    0,
                    20 - smoothAcc
                );

            const motionlessness =

                Math.max(
                    0,
                    10 - smoothGyro
                );

            absorption =

                stillness * 2
                + motionlessness * 2
                + swipeCount * 0.2;

            absorption =

                Math.min(
                    100,
                    absorption
                );

        }

        // ---------------------------------
        // SENSOR LISTENER
        // ---------------------------------

        let lastSensorUpdate = 0;

        window.addEventListener(

            "devicemotion",

            e => {

                const now = Date.now();

                if (
                    now - lastSensorUpdate < 50
                ) return;

                lastSensorUpdate = now;

                // -------------------------
                // ACCEL
                // -------------------------

                const acc =

                    e.accelerationIncludingGravity
                    ||

                    e.acceleration;

                if (acc) {

                    const x = acc.x || 0;
                    const y = acc.y || 0;
                    const z = acc.z || 0;

                    accMagnitude = Math.sqrt(

                        x * x +
                        y * y +
                        z * z

                    );

                }

                // -------------------------
                // GYRO
                // -------------------------

                const rot =
                    e.rotationRate;

                if (rot) {

                    const a =
                        rot.alpha || 0;

                    const b =
                        rot.beta || 0;

                    const g =
                        rot.gamma || 0;

                    gyroMagnitude = Math.sqrt(

                        a * a +
                        b * b +
                        g * g

                    );

                }

                // -------------------------
                // SMOOTHING
                // -------------------------

                smoothAcc =

                    smoothAcc * 0.9
                    + accMagnitude * 0.1;

                smoothGyro =

                    smoothGyro * 0.9
                    + gyroMagnitude * 0.1;

                // -------------------------
                // ABSORPTION
                // -------------------------

                computeAbsorption();

                // -------------------------
                // DISPLAY
                // -------------------------

                accelValue.innerText =
                    smoothAcc.toFixed(2);

                gyroValue.innerText =
                    smoothGyro.toFixed(2);

                swipeValue.innerText =
                    swipeCount;

                absorptionValue.innerText =
                    absorption.toFixed(1);

            }

        );

        // ---------------------------------
        // SWIPE COUNT
        // ---------------------------------

        let touchStartY = 0;

        document.addEventListener(

            "touchstart",

            e => {

                touchStartY =
                    e.touches[0].clientY;

            }

        );

        document.addEventListener(

            "touchend",

            e => {

                const dy =

                    e.changedTouches[0].clientY
                    - touchStartY;

                if (dy < -80) {

                    swipeCount++;

                }

            }

        );

        // ---------------------------------
        // AUTO LOGGING
        // ---------------------------------

        setInterval(() => {

            if (!recording)
                return;

            // REMOVE FIRST 10 SECONDS

            if (

                Date.now()
                - recordingStartTime

                <

                10000

            ) {

                return;

            }

            const entry = {

                time: Date.now(),

                accel: smoothAcc,

                gyro: smoothGyro,

                swipeCount,

                absorption,

                state: currentState

            };

            sessionLog.push(entry);

            console.log(entry);

        }, 1000);

    </script>

</body>

</html>
