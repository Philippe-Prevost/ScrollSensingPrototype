<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>
Embodied TikTok Sensing Recorder
</title>

<style>

html,
body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: black;

    color: white;

    font-family: sans-serif;

}

body {

    display: flex;

    flex-direction: column;

    align-items: center;

    gap: 12px;

    padding: 12px;

    box-sizing: border-box;

}

#controls {

    width: 100%;

    max-width: 650px;

    display: grid;

    grid-template-columns: 1fr 1fr;

    gap: 10px;

}

button {

    min-height: 72px;

    border: none;

    border-radius: 18px;

    font-size: 18px;

    font-weight: bold;

    background: white;

    color: black;

}

button:active {

    transform: scale(0.98);

}

#statusLine {

    width: 100%;

    max-width: 650px;

    display: flex;

    justify-content: space-between;

    align-items: center;

    font-size: 22px;

    font-weight: bold;

}

#sensorGrid {

    width: 100%;

    max-width: 650px;

    display: grid;

    grid-template-columns: 1fr 1fr;

    gap: 10px;

}

.sensorBox {

    background: rgba(255,255,255,0.08);

    border-radius: 16px;

    padding: 12px;

}

.label {

    font-size: 11px;

    opacity: 0.7;

    margin-bottom: 5px;

}

.value {

    font-size: 22px;

    font-weight: bold;

}

</style>

</head>

<body>

<div id="controls">

    <button
        onclick="startRecording('high_meta_awareness')">

        HIGH AWARENESS

    </button>

    <button
        onclick="startRecording('immersed_absorption')">

        IMMERSED

    </button>

    <button onclick="downloadData()">

        DOWNLOAD

    </button>

    <button onclick="resetData()">

        RESET

    </button>

</div>

<div id="statusLine">

    <div id="status">
        READY
    </div>

    <div id="timer">
        02:20
    </div>

</div>

<div id="sensorGrid">

    <div class="sensorBox">

        <div class="label">
            PHONE MOVEMENT ACCELERATION
        </div>

        <div class="value"
            id="accelDisplay">

            0

        </div>

    </div>

    <div class="sensorBox">

        <div class="label">
            PHONE ROTATION MOVEMENT
        </div>

        <div class="value"
            id="gyroDisplay">

            0

        </div>

    </div>

    <div class="sensorBox">

        <div class="label">
            DEVICE ORIENTATION ANGLE
        </div>

        <div class="value"
            id="orientationDisplay">

            0

        </div>

    </div>

    <div class="sensorBox">

        <div class="label">
            MICRO MOVEMENT VARIABILITY
        </div>

        <div class="value"
            id="variabilityDisplay">

            0

        </div>

    </div>

    <div class="sensorBox">

        <div class="label">
            AMBIENT HUMAN VOICE PRESENCE
        </div>

        <div class="value"
            id="voiceDisplay">

            NO

        </div>

    </div>

    <div class="sensorBox">

        <div class="label">
            AMBIENT SOUND COMPLEXITY
        </div>

        <div class="value"
            id="soundDisplay">

            0

        </div>

    </div>

</div>

<script>

// -----------------------------------------------------
// GLOBALS
// -----------------------------------------------------

let recording = false;

let recordingStartTime = 0;

// 2 MIN 20 SEC TOTAL

let recordingDuration = 140000;

let currentCondition = "";

let sessionData = [];

let smoothAccel = 0;

let smoothGyro = 0;

let accelHistory = [];

let movementVariability = 0;

let ambientVoicePresence = false;

let ambientSoundComplexity = 0;

// -----------------------------------------------------
// UI
// -----------------------------------------------------

const status =
    document.getElementById("status");

const timer =
    document.getElementById("timer");

const accelDisplay =
    document.getElementById("accelDisplay");

const gyroDisplay =
    document.getElementById("gyroDisplay");

const orientationDisplay =
    document.getElementById("orientationDisplay");

const variabilityDisplay =
    document.getElementById("variabilityDisplay");

const voiceDisplay =
    document.getElementById("voiceDisplay");

const soundDisplay =
    document.getElementById("soundDisplay");

// -----------------------------------------------------
// SENSOR PERMISSIONS
// -----------------------------------------------------

async function enableSensors() {

    try {

        if (

            typeof DeviceMotionEvent !==
            "undefined"

            &&

            typeof DeviceMotionEvent
                .requestPermission ===
            "function"

        ) {

            await DeviceMotionEvent
                .requestPermission();

        }

        await startMicrophone();

    }

    catch(err) {

        console.log(err);

    }

}

// -----------------------------------------------------
// START RECORDING
// -----------------------------------------------------

async function startRecording(condition) {

    await enableSensors();

    sessionData = [];

    currentCondition = condition;

    recording = true;

    recordingStartTime =
        Date.now();

    status.innerText =
        "RECORDING";

    setTimeout(() => {

        recording = false;

        status.innerText =
            "COMPLETE";

    }, recordingDuration);

}

// -----------------------------------------------------
// RESET
// -----------------------------------------------------

function resetData() {

    const ok =
        confirm(
            "Reset all recordings?"
        );

    if (!ok)
        return;

    sessionData = [];

    recording = false;

    status.innerText =
        "READY";

}

// -----------------------------------------------------
// DOWNLOAD
// -----------------------------------------------------

function downloadData() {

    // ---------------------------------
    // REMOVE FIRST 10s + LAST 10s
    // ---------------------------------

    const trimmedData =

        sessionData.filter(entry => {

            return (

                entry.sessionTimeElapsedMilliseconds
                >= 10000

                &&

                entry.sessionTimeElapsedMilliseconds
                <= 130000

            );

        });

    // ---------------------------------
    // DOWNLOAD
    // ---------------------------------

    const blob = new Blob(

        [
            JSON.stringify(
                trimmedData,
                null,
                2
            )
        ],

        {
            type: "application/json"
        }

    );

    const a =
        document.createElement("a");

    a.href =
        URL.createObjectURL(blob);

    a.download =
        `embodied_tiktok_sensing_trimmed.json`;

    a.click();

}

// -----------------------------------------------------
// DEVICE MOTION
// -----------------------------------------------------

window.addEventListener(

    "devicemotion",

    e => {

        const acc =

            e.accelerationIncludingGravity
            ||

            e.acceleration;

        if (acc) {

            const x = acc.x || 0;
            const y = acc.y || 0;
            const z = acc.z || 0;

            const magnitude = Math.sqrt(

                x*x +
                y*y +
                z*z

            );

            smoothAccel =

                smoothAccel * 0.9
                + magnitude * 0.1;

            accelHistory.push(
                smoothAccel
            );

            if (
                accelHistory.length > 30
            ) {

                accelHistory.shift();

            }

            movementVariability =
                calculateVariance(
                    accelHistory
                );

        }

        const rot =
            e.rotationRate;

        if (rot) {

            const a = rot.alpha || 0;
            const b = rot.beta || 0;
            const g = rot.gamma || 0;

            const gyroMagnitude = Math.sqrt(

                a*a +
                b*b +
                g*g

            );

            smoothGyro =

                smoothGyro * 0.9
                + gyroMagnitude * 0.1;

        }

        accelDisplay.innerText =
            smoothAccel.toFixed(2);

        gyroDisplay.innerText =
            smoothGyro.toFixed(2);

        orientationDisplay.innerText =
            getOrientation();

        variabilityDisplay.innerText =
            movementVariability.toFixed(2);

    }

);

// -----------------------------------------------------
// ORIENTATION
// -----------------------------------------------------

function getOrientation() {

    if (
        screen.orientation
    ) {

        return screen
            .orientation
            .angle;

    }

    return window.orientation || 0;

}

// -----------------------------------------------------
// VARIANCE
// -----------------------------------------------------

function calculateVariance(arr) {

    if (arr.length < 2)
        return 0;

    const mean =

        arr.reduce(
            (a,b)=>a+b,
            0
        ) / arr.length;

    const variance =

        arr.reduce(

            (a,b)=> {

                return a +
                    Math.pow(
                        b - mean,
                        2
                    );

            },

            0

        ) / arr.length;

    return variance;

}

// -----------------------------------------------------
// MICROPHONE ANALYSIS
// -----------------------------------------------------

async function startMicrophone() {

    try {

        const stream =

            await navigator
                .mediaDevices
                .getUserMedia({

                    audio: true

                });

        const audioContext =
            new AudioContext();

        const source =
            audioContext
                .createMediaStreamSource(
                    stream
                );

        const analyser =
            audioContext
                .createAnalyser();

        analyser.fftSize = 512;

        source.connect(analyser);

        const data =
            new Uint8Array(
                analyser.frequencyBinCount
            );

        setInterval(() => {

            analyser
                .getByteFrequencyData(
                    data
                );

            let total = 0;

            let activeBands = 0;

            for (
                let i = 0;
                i < data.length;
                i++
            ) {

                total += data[i];

                if (
                    data[i] > 35
                ) {

                    activeBands++;

                }

            }

            const average =
                total / data.length;

            ambientVoicePresence =
                average > 22;

            ambientSoundComplexity =
                activeBands /
                data.length;

            voiceDisplay.innerText =

                ambientVoicePresence
                    ? "YES"
                    : "NO";

            soundDisplay.innerText =

                ambientSoundComplexity
                    .toFixed(2);

        }, 400);

    }

    catch(err) {

        console.log(err);

    }

}

// -----------------------------------------------------
// LOGGING
// -----------------------------------------------------

setInterval(() => {

    if (!recording)
        return;

    const timestamp =
        Date.now();

    const elapsed =

        timestamp
        - recordingStartTime;

    const entry = {

        // ---------------------------------
        // SESSION
        // ---------------------------------

        timestamp:

            timestamp,

        recordingCondition:

            currentCondition,

        sessionTimeElapsedMilliseconds:

            elapsed,

        // ---------------------------------
        // BODY + DEVICE
        // ---------------------------------

        phoneMovementAcceleration:

            smoothAccel,

        phoneRotationMovement:

            smoothGyro,

        microMovementVariability:

            movementVariability,

        deviceOrientationAngle:

            getOrientation(),

        // ---------------------------------
        // ENVIRONMENT
        // ---------------------------------

        ambientHumanVoicePresence:

            ambientVoicePresence,

        ambientSoundComplexity:

            ambientSoundComplexity,

        // ---------------------------------
        // CONTEXT
        // ---------------------------------

        currentTimeOfDay:

            new Date()
                .toLocaleTimeString(),

        screenWidthPixels:

            window.innerWidth,

        screenHeightPixels:

            window.innerHeight,

        // ---------------------------------
        // LABEL
        // ---------------------------------

        intendedAttentionalState:

            currentCondition

    };

    sessionData.push(entry);

    console.log(entry);

}, 250);

// -----------------------------------------------------
// TIMER
// -----------------------------------------------------

setInterval(() => {

    if (!recording) {

        timer.innerText =
            "02:20";

        return;

    }

    const elapsed =

        Date.now()
        - recordingStartTime;

    const remaining =

        Math.max(
            0,
            recordingDuration - elapsed
        );

    const totalSeconds =

        Math.floor(
            remaining / 1000
        );

    const minutes =

        String(
            Math.floor(
                totalSeconds / 60
            )
        ).padStart(2, "0");

    const seconds =

        String(
            totalSeconds % 60
        ).padStart(2, "0");

    timer.innerText =

        `${minutes}:${seconds}`;

}, 100);

</script>

</body>

</html>
